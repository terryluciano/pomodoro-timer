name: Pull Request Check

on:
    pull_request:
        branches:
            - main

jobs:
    install:
        name: Install Dependencies
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v5

            - name: Setup Bun.js environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Node Modules
              id: cache
              uses: actions/cache@v5
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-bun-modules-${{ hashFiles('**/bun.lock') }}

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: bun install --frozen-lockfile

    check:
        name: Lint Code
        runs-on: ubuntu-latest
        needs: install
        steps:
            - name: Check out code
              uses: actions/checkout@v5

            - name: Setup Bun.js environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Node Modules
              id: cache
              uses: actions/cache@v5
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-bun-modules-${{ hashFiles('**/bun.lock') }}

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: bun install --frozen-lockfile

            - name: Run Lint
              run: bun run lint
